name: Run Startup Scraper Agent

on:
  schedule:
    - cron: '0 0 * * 0' # This tells the agent to wake up and run for free every Sunday at midnight
  workflow_dispatch: # Allows you to force run it manually with a single click

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install pandas requests openpyxl

    - name: Run Scraper Agent
      run: python agent.py

    - name: Save Extracted Data Back to Repo
      run: |
        git config --global user.name "Startup-Scraper-Agent"
        git config --global user.email "agent@github.com"
        git add latest_ceo_leads.csv
        git commit -m "Automated Agent Update: Fresh CEO Leads Added" || exit 0
        git push
